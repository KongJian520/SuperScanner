syntax = "proto3";

package status.v1;

// ServerInfo 服务：查询服务器信息（主机名、OS、uptime、资源信息等）。
service ServerInfo {
  rpc GetInfo (ServerInfoRequest) returns (ServerInfoResponse);
  rpc SyncNucleiTemplates (SyncNucleiTemplatesRequest) returns (SyncNucleiTemplatesResponse);
}

message ServerInfoRequest {
}

message ServerInfoResponse {
  string hostname = 1;
  string os = 2;
  uint64 uptime_seconds = 3;
  int32 cpu_cores = 4;
  uint64 memory_total_bytes = 5;
  uint64 memory_free_bytes = 6;
  string version = 7;
  // 可选：留空以保持跨平台兼容。实现中目前不填充 load_average。
  repeated double load_average = 8;
  uint64 disk_total_bytes = 9;
  uint64 disk_free_bytes = 10;
  repeated ToolCapability tools = 11;
  NucleiTemplatesStatus nuclei_templates = 12;

}

message ToolCapability {
  string tool_id = 1;
  bool available = 2;
  string source = 3;
  string path = 4;
}

message NucleiTemplatesStatus {
  string source = 1; // local|cache|none
  string configured_local_path = 2;
  string effective_path = 3;
  string repo_url = 4;
  string cache_path = 5;
  int64 last_sync_unix = 6;
  string last_error = 7;
  bool sync_supported = 8;
}

message SyncNucleiTemplatesRequest {
  string local_path = 1; // optional; empty means no update
  string repo_url = 2;   // optional; empty means keep current
  bool clear_local_path = 3;
}

message SyncNucleiTemplatesResponse {
  NucleiTemplatesStatus status = 1;
  string message = 2;
}
